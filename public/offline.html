<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#102033" />
    <title>SaleMap đang offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: #f5f8fb;
        color: #102033;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 420px);
        border: 1px solid #dbe5ef;
        border-radius: 12px;
        background: #ffffff;
        padding: 24px;
        box-shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
      }

      .icon {
        display: inline-grid;
        place-items: center;
        width: 52px;
        height: 52px;
        border-radius: 14px;
        background: #102033;
        color: white;
        font-weight: 800;
      }

      h1 {
        margin: 20px 0 8px;
        font-size: 28px;
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: #526173;
        font-size: 16px;
        line-height: 1.7;
      }

      button {
        min-height: 48px;
        margin-top: 22px;
        width: 100%;
        border: 0;
        border-radius: 10px;
        background: #22c58b;
        color: #102033;
        font-size: 16px;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="icon">SM</div>
      <h1>Bạn đang offline</h1>
      <p>
        SaleMap chưa tải được trang này. Nếu bạn vừa mở dashboard, lead hoặc ghi chú gần đây, hãy quay lại trang trước
        để dùng bản đã cache. Các form đang nhập sẽ được giữ trên thiết bị.
      </p>
      <button onclick="window.location.reload()">Thử tải lại</button>
    </main>
  </body>
</html>
